<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caritas AI — Guided BSP Review</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #1B4965; --navy-light: #EDF2F7; --slate: #4A5B6D; --muted: #6B7D8E;
  --dim: #6B7D8E; --border: #D5DDE5; --bg-alt: #F7F9FB; --bg-strip: #F0F5FA;
  --green: #2D936C; --green-bg: #E8F5EE; --amber: #C47F17; --amber-bg: #FDF4E3;
  --red: #C0392B; --red-bg: #FCEAE8; --white: #FFFFFF;
  --font-serif: 'Source Serif 4', Georgia, serif;
  --font-sans: 'DM Sans', -apple-system, sans-serif;
  --font-mono: 'DM Mono', 'SF Mono', monospace;
}
body { font-family: var(--font-sans); background: var(--white); color: #1B2A3D; -webkit-font-smoothing: antialiased; }
.shell { max-width: 620px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }
.header { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px; border-bottom: 1px solid #EDF0F3; position: sticky; top: 0; background: var(--white); z-index: 10; }
.header-brand { display: flex; align-items: center; gap: 10px; }
.header-logo { width: 28px; height: 28px; border-radius: 6px; background: var(--navy); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; font-family: var(--font-mono); }
.header-name { font-size: 14px; font-weight: 600; color: #1B2A3D; }
.header-sub { font-size: 12px; color: var(--dim); font-family: var(--font-mono); }
.risk-badge { display: flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; letter-spacing: 1px; font-family: var(--font-mono); transition: all 0.3s ease; }
.risk-dot { width: 8px; height: 8px; border-radius: 50%; }
.progress-track { height: 3px; background: #EDF0F3; width: 100%; }
.progress-bar { height: 100%; background: var(--navy); border-radius: 2px; transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
.content { flex: 1; padding: 28px 24px 110px 24px; overflow-y: auto; transition: opacity 0.18s ease; }
.content.fading { opacity: 0; }
.footer { position: sticky; bottom: 0; display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; border-top: 1px solid #EDF0F3; background: var(--white); z-index: 10; }
h1.screen-title { font-size: 22px; font-weight: 700; color: #1B2A3D; line-height: 1.3; font-family: var(--font-serif); margin-bottom: 6px; }
p.helper { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 16px; }
.answer-card { width: 100%; text-align: left; padding: 16px 20px; border-radius: 10px; border: 2px solid var(--border); background: var(--white); cursor: pointer; transition: all 0.15s ease; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; font-family: var(--font-sans); }
.answer-card:hover { border-color: #A0B0C0; }
.answer-card.selected { border-color: var(--navy); background: var(--navy-light); box-shadow: 0 0 0 3px #1B496522; }
.answer-radio { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #B0BEC5; background: var(--white); flex-shrink: 0; transition: all 0.15s ease; }
.answer-card.selected .answer-radio { border: 6px solid var(--navy); }
.answer-label { font-size: 15px; font-weight: 600; color: #1B2A3D; font-family: var(--font-serif); }
.answer-desc { font-size: 13px; color: var(--muted); margin-top: 2px; }
.multi-card { padding: 10px 16px; border-radius: 8px; border: 2px solid var(--border); background: var(--white); cursor: pointer; transition: all 0.15s ease; font-size: 13px; font-weight: 600; color: var(--slate); font-family: var(--font-sans); }
.multi-card:hover { border-color: #A0B0C0; }
.multi-card.selected { border-color: var(--navy); background: var(--navy-light); color: var(--navy); }
.multi-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.btn-primary { background: var(--navy); color: #fff; border: none; border-radius: 8px; padding: 12px 32px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: var(--font-sans); transition: all 0.15s ease; }
.btn-primary:hover { background: #153A52; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary.sm { font-size: 14px; padding: 10px 28px; }
.btn-back { background: none; border: none; color: var(--muted); font-size: 14px; font-weight: 500; cursor: pointer; padding: 10px 16px; font-family: var(--font-sans); }
.btn-back:hover { color: var(--slate); }
.small-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; font-family: var(--font-mono); display: block; margin-bottom: 4px; }
input.field, textarea.field { width: 100%; padding: 10px 14px; border-radius: 8px; border: 2px solid var(--border); font-size: 14px; font-family: var(--font-sans); outline: none; transition: border-color 0.15s ease; }
input.field:focus, textarea.field:focus { border-color: var(--navy); }
textarea.bsp-input { padding: 16px; border-radius: 10px; border: 2px solid var(--border); font-size: 14px; font-family: var(--font-sans); line-height: 1.6; resize: vertical; outline: none; width: 100%; }
textarea.bsp-input:focus { border-color: var(--navy); }
.soft-warning { font-size: 13px; color: var(--amber); padding: 10px 14px; background: var(--amber-bg); border-radius: 8px; margin-top: 8px; border: 1px solid #C47F1722; }
.info-box { background: var(--bg-strip); border-radius: 10px; padding: 20px; margin-top: 16px; border: 1px solid var(--border); font-size: 14px; color: var(--slate); line-height: 1.7; }
.info-box strong { color: #1B2A3D; }
.context-strip { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.context-tag { font-size: 11px; padding: 4px 10px; border-radius: 6px; font-weight: 600; font-family: var(--font-mono); }
.confidence-group { display: flex; gap: 8px; margin-top: 6px; }
.conf-btn { padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: 2px solid var(--border); background: var(--white); color: var(--muted); font-family: var(--font-sans); transition: all 0.15s ease; }
.conf-btn.selected { border-color: var(--navy); background: var(--navy-light); color: var(--navy); }
.result-card { background: var(--bg-alt); border-radius: 12px; padding: 24px; border: 1px solid var(--border); margin-top: 8px; }
.decision-badge { font-family: var(--font-mono); font-weight: 700; letter-spacing: 2px; border-radius: 6px; display: inline-block; color: #fff; }
.decision-badge.lg { font-size: 22px; padding: 10px 28px; }
.decision-badge.sm { font-size: 13px; padding: 5px 14px; letter-spacing: 1.5px; }
.decision-badge.pass { background: var(--green); }
.decision-badge.hold { background: var(--amber); }
.decision-badge.fail { background: var(--red); }
.band-label { font-size: 14px; color: var(--muted); font-family: var(--font-mono); }
.risk-story { font-size: 14px; color: #1B2A3D; line-height: 1.7; margin: 12px 0; }
.profile-tag { font-size: 12px; color: var(--muted); padding: 8px 12px; background: var(--navy-light); border-radius: 6px; font-family: var(--font-mono); }
.comp-card { padding: 16px; border-radius: 10px; border: 1px solid; margin-top: 8px; }
.comp-card.match { border-color: #2D936C33; background: var(--green-bg); }
.comp-card.differ { border-color: #C47F1733; background: var(--amber-bg); }
.comp-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.comp-card.match .comp-title { color: var(--green); }
.comp-card.differ .comp-title { color: var(--amber); }
.comp-body { font-size: 13px; line-height: 1.7; }
.comp-card.match .comp-body { color: #3D6B56; }
.comp-card.differ .comp-body { color: #7A6230; }
.vs-row { display: flex; gap: 12px; margin-top: 6px; margin-bottom: 16px; align-items: center; }
.vs-card { padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-alt); text-align: center; flex: 1; }
.vs-label { font-size: 10px; font-weight: 600; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; font-family: var(--font-mono); }
.vs-arrow { color: #B0BEC5; font-size: 16px; flex-shrink: 0; }
.issue-card { padding: 16px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 8px; background: var(--white); }
.issue-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.severity-tag { font-size: 10px; font-weight: 700; letter-spacing: 1px; padding: 2px 8px; border-radius: 4px; color: #fff; font-family: var(--font-mono); text-transform: uppercase; }
.severity-tag.critical { background: var(--red); }
.severity-tag.high { background: var(--amber); }
.severity-tag.moderate { background: var(--dim); }
.issue-section { font-size: 11px; color: var(--dim); font-family: var(--font-mono); }
.issue-title { font-size: 14px; font-weight: 600; color: #1B2A3D; margin-bottom: 4px; }
.issue-detail { font-size: 13px; color: var(--muted); line-height: 1.6; }
.improvement-section { padding: 16px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 10px; background: var(--white); }
.improvement-section-title { font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 8px; font-family: var(--font-mono); }
.btn-copy { font-size: 11px; font-weight: 600; color: var(--navy); background: var(--navy-light); border: 1px solid var(--border); border-radius: 6px; padding: 4px 12px; cursor: pointer; font-family: var(--font-mono); }
.btn-copy:hover { background: #DCE4ED; }
.empty-state { padding: 24px; border-radius: 10px; text-align: center; font-weight: 600; margin-top: 12px; }
.empty-state.good { background: var(--green-bg); color: var(--green); }
.loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--muted); font-family: var(--font-mono); }
.btn-view-bsp { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 600; color: var(--navy); cursor: pointer; font-family: var(--font-mono); transition: all 0.15s ease; display: flex; align-items: center; gap: 5px; }
.btn-view-bsp:hover { background: var(--navy-light); border-color: var(--navy); }
.btn-view-bsp svg { width: 14px; height: 14px; }
.bsp-drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 50; opacity: 0; transition: opacity 0.2s ease; pointer-events: none; }
.bsp-drawer-overlay.open { opacity: 1; pointer-events: auto; }
.bsp-drawer { position: fixed; top: 0; right: 0; bottom: 0; width: min(520px, 90vw); background: var(--white); z-index: 51; transform: translateX(100%); transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; box-shadow: -4px 0 24px rgba(0,0,0,0.12); }
.bsp-drawer.open { transform: translateX(0); }
.bsp-drawer-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #EDF0F3; flex-shrink: 0; }
.bsp-drawer-header h2 { font-size: 15px; font-weight: 700; color: #1B2A3D; font-family: var(--font-serif); margin: 0; }
.bsp-drawer-close { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 20px; padding: 4px 8px; border-radius: 4px; line-height: 1; }
.bsp-drawer-close:hover { background: #EDF0F3; color: #1B2A3D; }
.bsp-drawer-body { flex: 1; overflow-y: auto; padding: 20px; font-size: 13px; color: #1B2A3D; line-height: 1.8; white-space: pre-wrap; word-wrap: break-word; font-family: var(--font-sans); }
.guide-box { background: #F0F5FA; border-radius: 10px; padding: 14px 16px; margin-bottom: 20px; border: 1px solid #C8D6E5; display: flex; gap: 10px; align-items: flex-start; }
.guide-icon { width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px; color: var(--navy); }
.guide-text { font-size: 13px; color: var(--slate); line-height: 1.6; }
.upload-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 24px; text-align: center; cursor: pointer; transition: all 0.2s ease; margin-bottom: 12px; background: var(--bg-alt); }
.upload-zone:hover, .upload-zone.dragover { border-color: var(--navy); background: var(--navy-light); }
.upload-zone-icon { font-size: 28px; margin-bottom: 6px; color: var(--dim); }
.upload-zone-text { font-size: 14px; color: var(--slate); font-weight: 500; }
.upload-zone-hint { font-size: 12px; color: var(--dim); margin-top: 4px; }
.upload-zone-file { display: none; }
.upload-status { font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-bottom: 12px; }
.upload-status.extracting { background: var(--navy-light); color: var(--navy); border: 1px solid var(--navy)22; }
.upload-status.success { background: var(--green-bg); color: var(--green); border: 1px solid var(--green)22; }
.upload-status.error { background: var(--red-bg); color: var(--red); border: 1px solid var(--red)22; }
.or-divider { text-align: center; color: var(--dim); font-size: 12px; font-weight: 600; letter-spacing: 1px; font-family: var(--font-mono); margin: 12px 0; text-transform: uppercase; }
.hidden { display: none; }
@media (max-width: 480px) {
  .content { padding: 20px 16px 100px 16px; }
  .header { padding: 12px 16px; }
  .footer { padding: 10px 16px; }
  h1.screen-title { font-size: 19px; }
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
</head>
<body>

<div class="shell" id="app">
  <div class="header">
    <div class="header-brand">
      <div class="header-logo">C</div>
      <span class="header-name">Caritas AI</span>
      <span class="header-sub">Guided Review</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div id="risk-indicator" class="hidden"></div>
      <button id="btn-view-bsp" class="btn-view-bsp hidden" onclick="toggleBspDrawer(true)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        View BSP
      </button>
    </div>
  </div>
  <div id="progress-wrap" class="hidden">
    <div class="progress-track"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
  </div>
  <div class="content" id="content"></div>
  <div class="footer" id="footer"></div>
</div>

<div class="bsp-drawer-overlay" id="bsp-overlay" onclick="toggleBspDrawer(false)"></div>
<div class="bsp-drawer" id="bsp-drawer">
  <div class="bsp-drawer-header">
    <h2>Behaviour Support Plan</h2>
    <button class="bsp-drawer-close" onclick="toggleBspDrawer(false)">&times;</button>
  </div>
  <div class="bsp-drawer-body" id="bsp-drawer-body"></div>
</div>

<div class="loading-overlay hidden" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Analysing BSP…</div>
</div>

<script>
// ─── CONFIG ───
const SUPABASE_URL = "https://jbgzlxtqnrctpsnvjort.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpiZ3pseHRxbnJjdHBzbnZqb3J0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTA5NzUsImV4cCI6MjA4ODkyNjk3NX0.YmayaIMNiUDP5jci3sxd2nkg_2-7IRYS5ORwlOuEgIE";
const EVALUATOR_FN = SUPABASE_URL + "/functions/v1/bsp-evaluator";
const SUBMIT_FN = SUPABASE_URL + "/functions/v1/guided-review-submit";

const ANALYSIS_FN = SUPABASE_URL + "/functions/v1/bsp-guided-analysis";

// ── Case loader: reads ?case= param, fetches bsp_cases row, pre-fills BSP ──
(async function loadCaseFromURL() {
  const ref = new URLSearchParams(location.search).get('case');
  if (!ref) return;
  try {
    const r = await fetch(SUPABASE_URL + '/rest/v1/bsp_cases?case_ref=eq.' + encodeURIComponent(ref) + '&select=case_ref,deid_text,original_filename,ai_score,ai_profile,ai_recommendation&limit=1', {
      headers: { 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY, 'apikey': SUPABASE_ANON_KEY }
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const rows = await r.json();
    if (!rows.length) { console.warn('Case not found:', ref); return; }
    const row = rows[0];
    window._intakeCase = row;
    // Wait for state to be available then pre-fill
    const fill = () => {
      if (typeof state !== 'undefined' && row.deid_text) {
        state.bsp_text = row.deid_text;
        state.case_ref = row.case_ref;
        // Show banner
        const banner = document.createElement('div');
        banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#1a3a2a;color:#3fb950;font-size:12px;font-weight:600;text-align:center;padding:7px;z-index:9999;letter-spacing:.04em;';
        banner.textContent = 'Case loaded: ' + row.case_ref + (row.original_filename ? ' — ' + row.original_filename : '') + ' (BSP pre-filled — click Next to begin)';
        document.body.prepend(banner);
      } else {
        setTimeout(fill, 150);
      }
    };
    fill();
  } catch(e) { console.warn('Case load failed:', e); }
})();

// ─── STATE ───
const S = {
  INPUT:0, INTRO:1, BEHAVIOUR:2, FUNCTION:3, STRATEGY:4,
  RESTRICTIVE:5, RESTRICTIVE_TYPES:6, RP_AUTH:7, FADEOUT:8, CONSENT:9,
  RISK:10, DECISION:11, SYSTEM:12, COMPARISON:13,
  CRITICAL:14, IMPROVEMENTS:15, REFLECTION:16
};
let screen = S.INPUT;
let state = {
  bsp_text:"", behaviour_clarity:null, function_quality:null,
  strategy_alignment:null, restrictive_present:null, restrictive_types:[],rp_authorisation:"",
  fade_out:null, consent:null, user_risk_category:null, user_risk_detail:"",
  user_decision:null, decision_confidence:null, decision_reason:"",
  final_agreement:null, final_comment:"", bsp_analysis:null
};
let evalResult = null;

// ─── RISK CALC ───
const RISK_W = {
  behaviour_clarity:{"Clear and specific":0,"Some unclear areas":1,"Vague or missing":3},
  function_quality:{"Clear and logical":0,"Some reasoning but weak":1,"Unclear or missing":3},
  strategy_alignment:{"Clearly aligned":0,"Some mismatch":2,"Not aligned":3},
  restrictive_present:{"Yes":2,"No":0,"Unsure":1},
  fade_out:{"Clear and staged":0,"Mentioned but vague":1,"Missing":3},
  consent:{"Clear":0,"Partial or unclear":1,"Missing":3}
};
function riskLevel(){
  let s=0;
  for(const[k,m]of Object.entries(RISK_W)) if(state[k]&&m[state[k]]!==undefined) s+=m[state[k]];
  if(s<=2) return {level:"LOW",color:"#2D936C",bg:"#E8F5EE"};
  if(s<=6) return {level:"MODERATE",color:"#C47F17",bg:"#FDF4E3"};
  return {level:"HIGH",color:"#C0392B",bg:"#FCEAE8"};
}

// ─── NAVIGATION ───
function canNext(){
  switch(screen){
    case S.INPUT: return state.bsp_text.trim().length>20;
    case S.INTRO: return true;
    case S.BEHAVIOUR: return !!state.behaviour_clarity;
    case S.FUNCTION: return !!state.function_quality;
    case S.STRATEGY: return !!state.strategy_alignment;
    case S.RESTRICTIVE: return !!state.restrictive_present;
    case S.RESTRICTIVE_TYPES: return state.restrictive_types.length>0;
    case S.RP_AUTH: return !!state.rp_authorisation;
    case S.FADEOUT: return !!state.fade_out;
    case S.CONSENT: return !!state.consent;
    case S.RISK: return !!state.user_risk_category;
    case S.DECISION: return !!state.user_decision&&!!state.decision_confidence;
    default: return true;
  }
}
function nextTarget(){
  if(screen===S.RESTRICTIVE&&state.restrictive_present==="Yes") return S.RESTRICTIVE_TYPES;
  if(screen===S.RESTRICTIVE&&state.restrictive_present!=="Yes") return S.CONSENT;
  if(screen===S.RESTRICTIVE_TYPES) return S.RP_AUTH;
  if(screen===S.RP_AUTH) return S.FADEOUT;
  if(screen===S.FADEOUT) return S.CONSENT;
  return screen+1;
}
function backTarget(){
  if(screen===S.CONSENT&&state.restrictive_present==="No") return S.RESTRICTIVE;
  if(screen===S.CONSENT&&state.restrictive_present==="Unsure") return S.RESTRICTIVE;
  if(screen===S.CONSENT&&state.restrictive_present==="Yes") return S.FADEOUT;
  if(screen===S.FADEOUT) return S.RP_AUTH;
  if(screen===S.RP_AUTH) return S.RESTRICTIVE_TYPES;
  if(screen===S.RESTRICTIVE_TYPES) return S.RESTRICTIVE;
  return screen-1;
}
function goTo(target){
  const c=document.getElementById("content");
  c.classList.add("fading");
  setTimeout(()=>{screen=target;render();c.classList.remove("fading");},180);
}
async function goNext(){
  if(screen===S.DECISION){
    await submitJudgement();

async function runEvaluator(){
  const loading=document.getElementById("loading");
  const loadText=document.getElementById("loading-text");
  loading.classList.remove("hidden");
  loadText.textContent="Analysing BSP…";
  try{
    if(!SUPABASE_ANON_KEY){

    });

  }catch(e){

    evalResult = mockResult();
  }
  loading.classList.add("hidden");

function normaliseEvalResult(data){
  // Map bsp-evaluator response shape to UI needs
  const d = data.evaluation || data;
  const band = d.band || d.quality_band || "C";
  const flags = d.flags || d.critical_flags || [];
  const decision = band<="B" ? "PASS" : band==="C" ? "HOLD" : "FAIL";
  const issues = flags.map(f=>({
    title: f.label || f.flag_type || f.title || "Issue",
    severity: f.severity || (f.flag_confidence==="high"?"critical":"moderate"),
    detail: f.detail || f.explanation || f.description || "",
    section: f.section || f.bsp_section || "General"
  }));
  const profile = d.profile || d.case_profile || "Profile C";
  const riskStory = d.risk_story || d.dominant_risk || (issues.length>0 ? issues[0].detail : "No critical issues identified.");
  return {decision, band, riskStory, profile, issues};
}

function mockResult(){
  const issues=[];
  if(state.behaviour_clarity==="Vague or missing") issues.push({title:"Behaviour descriptions lack specificity",severity:"critical",detail:"Observable, measurable descriptions needed for consistent staff responses.",section:"Behaviour Description"});
  if(state.function_quality==="Unclear or missing") issues.push({title:"Functional assessment is absent or inadequate",severity:"critical",detail:"Without a clear function, strategies cannot be properly targeted.",section:"Functional Assessment"});
  if(state.strategy_alignment==="Not aligned") issues.push({title:"Strategies do not address identified function",severity:"critical",detail:"Interventions should target why the behaviour occurs.",section:"Strategies"});
  if(state.restrictive_present==="Yes"&&state.fade_out==="Missing") issues.push({title:"No fade-out plan for restrictive practices",severity:"critical",detail:"NDIS Practice Standards require a documented plan to reduce and eliminate restrictive practices.",section:"Restrictive Practices"});
  if(state.consent==="Missing") issues.push({title:"Consent and authorisation not documented",severity:"high",detail:"Authorisation must be documented with appropriate decision-makers.",section:"Consent and Rights"});
  if(state.function_quality==="Some reasoning but weak") issues.push({title:"Functional assessment needs strengthening",severity:"moderate",detail:"Link between triggers, behaviour, and maintaining consequences should be more explicit.",section:"Functional Assessment"});
  if(state.strategy_alignment==="Some mismatch") issues.push({title:"Partial strategy-function mismatch",severity:"moderate",detail:"Some strategies appear generic rather than function-specific.",section:"Strategies"});
  if(state.consent==="Partial or unclear") issues.push({title:"Consent documentation is incomplete",severity:"moderate",detail:"Document who was consulted and how preferences were incorporated.",section:"Consent and Rights"});
  const cc=issues.filter(i=>i.severity==="critical").length;
  const rl=riskLevel();
  let decision="PASS",band="A";
  if(cc>=2||rl.level==="HIGH"){decision="FAIL";band="D";}
  else if(cc===1||rl.level==="MODERATE"){decision="HOLD";band="C";}
  else if(issues.length>0){decision="HOLD";band="B";}
  const riskStory=issues.length>0?`The dominant concern is ${issues[0].title.toLowerCase()}. ${issues[0].detail}`:"No critical issues identified. The BSP meets expected quality standards.";
  const profile=state.restrictive_present==="Yes"?(cc>=2?"Profile D — High risk, restrictive practices with significant gaps":"Profile C — Moderate risk, restrictive practices present"):(cc>=1?"Profile B — Quality gaps without restrictive practice concerns":"Profile A — Low risk, meets standards");
  return {decision,band,riskStory,profile,issues};
}



// ─── BSP ANALYSIS ───
function keywordScan(text){
  var t=text.toLowerCase();
  var result={};
  // Behaviour clarity
  var behTerms=["observable","measurable","frequency","duration","intensity","topography","operational definition"];
  var behFound=behTerms.filter(function(w){return t.includes(w);});
  result.behaviour_clarity=behFound.length>=2?"This BSP uses some behavioural measurement terms ("+behFound.join(", ")+"). Check whether each target behaviour has a clear operational definition.":"Limited use of observable/measurable language. Look for whether staff could reliably identify and record each behaviour as described.";
  // Function
  var funcTerms=["function","antecedent","consequence","trigger","maintain","escape","attention","sensory","tangible","abc","functional analysis","functional assessment"];
  var funcFound=funcTerms.filter(function(w){return t.includes(w);});
  result.function_quality=funcFound.length>=2?"Functional language detected ("+funcFound.join(", ")+"). Verify the logic chain connects triggers to behaviour to maintaining consequences.":"Limited functional assessment language found. Check whether the plan identifies why the behaviour occurs or just describes what happens.";
  // Strategy
  var stratTerms=["proactive","active","reactive","prevention","de-escalation","replacement","alternative","reinforcement","antecedent manipulation"];
  var stratFound=stratTerms.filter(function(w){return t.includes(w);});
  result.strategy_alignment=stratFound.length>=2?"Strategy terms found ("+stratFound.join(", ")+"). Verify each strategy links back to the identified function rather than being generic.":"Few strategy-type terms detected. Check whether interventions target the function of behaviour or are generic management approaches.";
  // Restrictive practices
  var rpTerms=["restraint","prn","seclusion","restrict","chemical","environmental","physical","mechanical","locked","removed items","protective equipment"];
  var rpFound=rpTerms.filter(function(w){return t.includes(w);});
  result.restrictive_practices=rpFound.length>0?"Possible restrictive practice indicators found: "+rpFound.join(", ")+". Verify whether these are formally identified as restrictive and appropriately safeguarded.":"No obvious restrictive practice terms detected. Read carefully for implied restrictions that may not be explicitly labelled.";
  // Fade-out
  var fadeTerms=["fade","reduce","eliminate","phase out","transition","step down","decrease","time-limited","review date","reduction plan"];
  var fadeFound=fadeTerms.filter(function(w){return t.includes(w);});
  result.fade_out=fadeFound.length>0?"Some reduction/fade-out language found ("+fadeFound.join(", ")+"). Check for specific timelines, criteria, and review dates.":"No clear fade-out or reduction language detected. If restrictive practices are present, a documented reduction plan is required.";
  // Consent
  var conTerms=["consent","authoris","guardian","nominee","rights","decision-maker","tribunal","panel","approved","permission"];
  var conFound=conTerms.filter(function(w){return t.includes(w);});
  result.consent=conFound.length>=2?"Consent-related terms found ("+conFound.join(", ")+"). Verify who consented, when, and whether authorisation covers all restrictive practices.":"Limited consent documentation language. Check whether the plan records who was consulted and whether restrictive practices are formally authorised.";
  // Risk + Overall
  result.biggest_risk="Review the BSP for the single most significant gap. Consider: are restrictive practices identified and safeguarded? Is the functional assessment adequate to support the strategies?";
  result.overall="Keyword scan complete. The AI-powered analysis was not available. Use the indicators above as starting points for your clinical review.";
  return result;
}

async function runBspAnalysis(){
  var loadEl=document.getElementById("loading");
  var loadText=document.getElementById("loading-text");
  loadEl.classList.remove("hidden");
  loadText.textContent="Analysing BSP for guided review...";
  try{
    if(!SUPABASE_ANON_KEY){
      state.bsp_analysis=keywordScan(state.bsp_text);
      loadEl.classList.add("hidden");
      return;
    }
    var res=await fetch(ANALYSIS_FN,{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+SUPABASE_ANON_KEY,"apikey":SUPABASE_ANON_KEY},
      body:JSON.stringify({bsp_text:state.bsp_text,rp_status:state.rp_authorisation||"unknown"})
    });
    var data=await res.json();
    if(data.error||!data.behaviour_clarity){
      state.bsp_analysis=keywordScan(state.bsp_text);
    } else {
      state.bsp_analysis=data;
    }
  }catch(e){
    console.warn("Analysis failed, using keyword scan:",e);
    state.bsp_analysis=keywordScan(state.bsp_text);
  }
  loadEl.classList.add("hidden");
}

function initDragPrevention(){
  document.addEventListener("dragover",function(e){e.preventDefault();});
  document.addEventListener("drop",function(e){e.preventDefault();});
}
initDragPrevention();

async function extractTextFromFile(file){
  const name=file.name.toLowerCase();
  if(name.endsWith(".pdf")){
    return await extractPDF(file);
  } else if(name.endsWith(".docx")||name.endsWith(".doc")){
    return await extractDOCX(file);
  }
  throw new Error("Unsupported file type. Please use PDF or DOCX.");
}

async function extractPDF(file){
  const arrayBuf=await file.arrayBuffer();
  if(typeof pdfjsLib==="undefined") throw new Error("PDF library not loaded. Check your connection.");
  pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  const pdf=await pdfjsLib.getDocument({data:arrayBuf}).promise;
  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const content=await page.getTextContent();
    text+=content.items.map(item=>item.str).join(" ")+"\n";
  }
  return text.trim();
}

async function extractDOCX(file){
  const arrayBuf=await file.arrayBuffer();
  if(typeof mammoth==="undefined") throw new Error("DOCX library not loaded. Check your connection.");
  const result=await mammoth.extractRawText({arrayBuffer:arrayBuf});
  return result.value.trim();
}

async function handleFileUpload(file){
  const statusEl=document.getElementById("upload-status");
  if(!file) return;
  const name=file.name.toLowerCase();
  if(!name.endsWith(".pdf")&&!name.endsWith(".docx")&&!name.endsWith(".doc")){
    statusEl.style.display="block";statusEl.className="upload-status error";
    statusEl.textContent="Unsupported file type. Please upload a PDF or Word document.";
    return;
  }
  statusEl.style.display="block";statusEl.className="upload-status extracting";
  statusEl.textContent="Extracting text from "+file.name+"...";
  try{
    const text=await extractTextFromFile(file);
    if(!text||text.length<10){
      statusEl.className="upload-status error";
      statusEl.textContent="Could not extract text. The file may be scanned or image-based.";
      return;
    }
    state.bsp_text=text;
    statusEl.className="upload-status success";
    statusEl.textContent="Extracted "+text.length+" characters from "+file.name;
    render();
  }catch(e){
    statusEl.className="upload-status error";
    statusEl.textContent="Error: "+e.message;
  }
}

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs) for(const[k,v]of Object.entries(attrs)){
    if(k==="className") el.className=v;
    else if(k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="disabled"){if(v)el.setAttribute(k,"");else el.removeAttribute(k);}else el.setAttribute(k,v);
  }
  for(const c of children){
    if(typeof c==="string") el.appendChild(document.createTextNode(c));
    else if(c) el.appendChild(c);
  }
  return el;
}

    const strip=h("div",{className:"context-strip"});

      {label:"Function",val:state.function_quality},
      {label:"Strategy",val:state.strategy_alignment},
      {label:"Restriction",val:state.restrictive_present}

      const bad=["Vague or missing","Unclear or missing","Not aligned","Missing"].includes(i.val);

      break;
    }
    case S.DECISION:{
      frag.appendChild(h("h1",{className:"screen-title"},"What is your overall decision?"));
      frag.appendChild(guideBox("Commit to your independent assessment before seeing the system result. PASS means safe and appropriate. HOLD means it needs revision before use. FAIL means significant risk that must be addressed.","overall"));
      frag.appendChild(answerCard("PASS — Safe and appropriate",null,"user_decision","PASS"));
      frag.appendChild(answerCard("HOLD — Needs revision",null,"user_decision","HOLD"));
      frag.appendChild(answerCard("FAIL — Significant risk",null,"user_decision","FAIL"));
      if(state.user_decision){
        const confWrap=h("div",{style:{marginTop:"20px"}});
        confWrap.appendChild(h("label",{className:"small-label"},"How confident are you?"));
        const confGroup=h("div",{className:"confidence-group"});
        for(const c of["High","Medium","Low"]){
          confGroup.appendChild(h("button",{className:"conf-btn"+(state.decision_confidence===c?" selected":""),onclick:()=>{state.decision_confidence=c;render();}},c));
        }
        confWrap.appendChild(confGroup);
        frag.appendChild(confWrap);
        const whyWrap=h("div",{style:{marginTop:"16px"}});
        whyWrap.appendChild(h("label",{className:"small-label"},"Why? (optional)"));
        const whyInp=h("input",{className:"field",type:"text",placeholder:"Brief reasoning...",oninput:e=>{state.decision_reason=e.target.value;}});
        whyInp.value=state.decision_reason;
        whyWrap.appendChild(whyInp);
        frag.appendChild(whyWrap);
      }
      break;
    }
    case S.SYSTEM:{
      if(!evalResult) break;
      frag.appendChild(h("h1",{className:"screen-title"},"Caritas Assessment"));
      const card=h("div",{className:"result-card"});
      const topRow=h("div",{style:{display:"flex",alignItems:"center",gap:"16px",marginBottom:"16px"}});
      topRow.appendChild(decBadge(evalResult.decision,"lg"));
      topRow.appendChild(h("div",{className:"band-label"},"Band "+evalResult.band));
      card.appendChild(topRow);
      card.appendChild(h("div",{className:"risk-story"},evalResult.riskStory));
      card.appendChild(h("div",{className:"profile-tag"},evalResult.profile));
      frag.appendChild(card);
      break;
    }
    case S.COMPARISON:{
      if(!evalResult) break;
      frag.appendChild(h("h1",{className:"screen-title"},"Your Assessment vs Caritas"));
      const match=state.user_decision===evalResult.decision;
      const compCard=h("div",{className:"comp-card "+(match?"match":"differ")});
      compCard.appendChild(h("div",{className:"comp-title"},match?"Decisions align":"Different perspectives"));
      if(match){
        const body=h("div",{className:"comp-body"});
        body.innerHTML=`You and Caritas both assessed this BSP as <strong>${state.user_decision}</strong>. This consistency strengthens the evaluation.`;
        compCard.appendChild(body);
      } else {
        const body=h("div",{className:"comp-body"});
        body.innerHTML=`You assessed <strong>${state.user_decision}</strong> — Caritas assessed <strong>${evalResult.decision}</strong>. This difference is worth exploring. Your clinical reasoning may capture context the system cannot see, and the system may flag patterns worth a second look. Neither perspective is automatically correct.`;
        compCard.appendChild(body);
      }
      frag.appendChild(compCard);

      const secWrap=h("div",{style:{marginTop:"20px"}});
      secWrap.appendChild(h("div",{className:"small-label"},"Decision"));
      const vsRow=h("div",{className:"vs-row"});
      const userVs=h("div",{className:"vs-card"});
      userVs.appendChild(h("div",{className:"vs-label"},"You"));
      userVs.appendChild(decBadge(state.user_decision));
      vsRow.appendChild(userVs);
      vsRow.appendChild(h("div",{className:"vs-arrow"},"↔"));
      const sysVs=h("div",{className:"vs-card"});
      sysVs.appendChild(h("div",{className:"vs-label"},"Caritas"));
      sysVs.appendChild(decBadge(evalResult.decision));
      vsRow.appendChild(sysVs);
      secWrap.appendChild(vsRow);

      secWrap.appendChild(h("div",{className:"small-label"},"Primary Risk"));
      const riskRow=h("div",{className:"vs-row"});
      const userRiskVs=h("div",{className:"vs-card",style:{flex:"1"}});
      userRiskVs.appendChild(h("div",{className:"vs-label"},"You"));
      userRiskVs.appendChild(h("div",{style:{fontSize:"13px",color:"#1B2A3D"}},state.user_risk_category||"—"));
      riskRow.appendChild(userRiskVs);
      const sysRiskVs=h("div",{className:"vs-card",style:{flex:"1"}});
      sysRiskVs.appendChild(h("div",{className:"vs-label"},"Caritas"));
      sysRiskVs.appendChild(h("div",{style:{fontSize:"13px",color:"#1B2A3D"}},evalResult.issues[0]?.title||"No critical issues"));
      riskRow.appendChild(sysRiskVs);
      secWrap.appendChild(riskRow);
      frag.appendChild(secWrap);
      break;
    }
    case S.CRITICAL:{
      if(!evalResult) break;
      frag.appendChild(h("h1",{className:"screen-title"},"Critical Issues"));
      frag.appendChild(h("p",{className:"helper"},"Highest-priority issues that should be addressed, ordered by severity."));
      const sorted=[...evalResult.issues].sort((a,b)=>{const o={critical:0,high:1,moderate:2};return(o[a.severity]??3)-(o[b.severity]??3);});
      if(sorted.length===0){
        frag.appendChild(h("div",{className:"empty-state good"},"No critical issues identified"));
      } else {
        for(const issue of sorted){
          const card=h("div",{className:"issue-card"});
          const hdr=h("div",{className:"issue-header"});
          hdr.appendChild(h("span",{className:"severity-tag "+issue.severity},issue.severity));
          hdr.appendChild(h("span",{className:"issue-section"},issue.section));
          card.appendChild(hdr);
          card.appendChild(h("div",{className:"issue-title"},issue.title));
          card.appendChild(h("div",{className:"issue-detail"},issue.detail));
          frag.appendChild(card);
        }
      }
      break;
    }
    case S.IMPROVEMENTS:{
      if(!evalResult) break;
      frag.appendChild(h("h1",{className:"screen-title"},"Suggested Improvements"));
      frag.appendChild(h("p",{className:"helper"},"Targeted recommendations by section. Use copy to transfer content directly."));
      var allIssues=evalResult.issues||[];
      var isFail=evalResult.decision==="FAIL"||evalResult.decision==="HOLD";
      if(allIssues.length===0&&!isFail){
        frag.appendChild(h("div",{className:"empty-state good"},"No improvements needed \u2014 this BSP meets standards"));
      } else if(allIssues.length===0&&isFail){
        var warn=h("div",{style:{padding:"16px",borderRadius:"10px",border:"1px solid #C0392B33",background:"#FCEAE8",marginTop:"12px"}});
        warn.appendChild(h("div",{style:{fontSize:"14px",fontWeight:"600",color:"#C0392B",marginBottom:"6px"}},"This BSP was assessed as "+evalResult.decision));
        warn.appendChild(h("div",{style:{fontSize:"13px",color:"#7A3030",lineHeight:"1.6"}},evalResult.riskStory||"Review the critical issues on the previous screen for specific concerns."));
        warn.appendChild(h("button",{className:"btn-copy",style:{marginTop:"8px"},onclick:()=>{navigator.clipboard?.writeText(evalResult.riskStory||"");}},"Copy"));
        frag.appendChild(warn);
      } else {
        var grouped={};
        for(var gi=0;gi<allIssues.length;gi++){var issue=allIssues[gi];var sec=issue.section||"General";if(!grouped[sec])grouped[sec]=[];grouped[sec].push(issue);}
        var sevOrder=function(a,b){var o={critical:0,high:1,moderate:2};return(o[a.severity]||3)-(o[b.severity]||3);};
        var secNames=Object.keys(grouped);
        for(var si=0;si<secNames.length;si++){
          var secName=secNames[si];var secIssues=grouped[secName].sort(sevOrder);
          var secDiv=h("div",{className:"improvement-section"});
          secDiv.appendChild(h("div",{className:"improvement-section-title"},secName));
          for(var ii=0;ii<secIssues.length;ii++){
            var iss=secIssues[ii];
            secDiv.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}},h("span",{className:"severity-tag "+iss.severity},iss.severity),h("span",{className:"issue-title",style:{marginBottom:"0"}},iss.title)));
            secDiv.appendChild(h("div",{className:"issue-detail",style:{marginBottom:"8px"}},iss.detail));
            secDiv.appendChild(h("button",{className:"btn-copy",style:{marginBottom:"12px"},onclick:(function(t,d){return function(){navigator.clipboard?.writeText(t+": "+d);};})(iss.title,iss.detail)},"Copy"));
          }
          frag.appendChild(secDiv);
        }
        if(isFail&&allIssues.length>0){
          var summary=h("div",{style:{padding:"12px 16px",borderRadius:"8px",background:"#FDF4E3",border:"1px solid #C47F1733",marginTop:"12px",fontSize:"13px",color:"#7A6230",lineHeight:"1.6"}});
          summary.textContent="This BSP was assessed as "+evalResult.decision+". Address the critical and high severity items above before resubmission.";
          frag.appendChild(summary);
        }
      }
      break;
    }
    case S.REFLECTION:{
      frag.appendChild(h("h1",{className:"screen-title"},"Do you agree with the final evaluation?"));
      frag.appendChild(h("p",{className:"helper"},"Your feedback strengthens the system and supports your professional development."));
      frag.appendChild(answerCard("Yes","The evaluation reflects my clinical judgement","final_agreement","Yes"));
      frag.appendChild(answerCard("Partially","Some aspects align but I have reservations","final_agreement","Partially"));
      frag.appendChild(answerCard("No","I disagree with the overall evaluation","final_agreement","No"));
      if(state.final_agreement){
        const wrap=h("div",{style:{marginTop:"16px"}});
        wrap.appendChild(h("label",{className:"small-label"},"What would you change? (optional)"));
        const ta=h("textarea",{className:"field",placeholder:"Your feedback...",rows:"3",style:{resize:"vertical"},oninput:e=>{state.final_comment=e.target.value;}});
        ta.value=state.final_comment;
        wrap.appendChild(ta);
        frag.appendChild(wrap);
        frag.appendChild(h("button",{className:"btn-primary",style:{marginTop:"16px"},onclick:async()=>{
          await submitFinal();
          alert("Review submitted. Thank you.");
        }},"Submit Review"));
      }
      break;
    }
  }
  c.appendChild(frag);
}

async function submitFinal(){
  // Write-back to bsp_cases if loaded from intake
  if (window._intakeCase && window._intakeCase.case_ref) {
    try {
      const ref = window._intakeCase.case_ref;
      const patch = {
        katrina_submitted_at: new Date().toISOString(),
      };
      // Extract score from state if available
      if (typeof state !== 'undefined') {
        if (state.overall_score != null) patch.katrina_score = state.overall_score;
        if (state.overall_profile)       patch.katrina_profile = state.overall_profile;
        if (state.overall_band)          patch.katrina_band = state.overall_band;
      }
      await fetch(SUPABASE_URL + '/rest/v1/bsp_cases?case_ref=eq.' + encodeURIComponent(ref), {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
          'apikey': SUPABASE_ANON_KEY,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(patch)
      });
      console.log('bsp_cases updated for', ref);
    } catch(e) { console.warn('bsp_cases write-back failed:', e); }
  }
  if(!SUPABASE_ANON_KEY) return;
  try{
    await fetch(SUBMIT_FN,{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+SUPABASE_ANON_KEY,"apikey":SUPABASE_ANON_KEY},
      body:JSON.stringify({
        type:"final_reflection",
        user_decision: state.user_decision,
        system_decision: evalResult?.decision,
        final_agreement: state.final_agreement,
        final_comment: state.final_comment,
        submitted_at: new Date().toISOString(),
        bsp_id: state.bsp_id || "manual",
        reviewer: state.reviewer || "unknown",
        calibration_session: state.calibration_session || null,
        is_test: state.is_test === true,
        rp_authorisation: state.rp_authorisation || "unknown",
        reviewer_mapped: mapToEvaluatorSchema(state)
      })
    });
  }catch(e){console.warn("Final submit failed:",e);}
}

function renderWarning(){
  const w=document.getElementById("input-warning");
  if(!w) return;
  const len=state.bsp_text.trim().length;
  if(len>0&&len<=20) w.innerHTML='<div class="soft-warning">⚠ This text looks unusually short. Please confirm you\'ve pasted the complete BSP.</div>';
  else w.innerHTML="";
}

function renderRisk(){
  const el=document.getElementById("risk-indicator");
  const show=screen>=S.BEHAVIOUR&&screen<=S.DECISION||screen===S.RP_AUTH;
  if(!show){el.classList.add("hidden");return;}
  el.classList.remove("hidden");
  const r=riskLevel();
  el.innerHTML="";
  el.className="risk-badge";
  el.style.background=r.bg;
  el.style.border="1px solid "+r.color+"22";
  el.style.color=r.color;
  const dot=document.createElement("div");
  dot.className="risk-dot";
  dot.style.background=r.color;
  dot.style.boxShadow="0 0 6px "+r.color+"66";
  el.appendChild(dot);
  el.appendChild(document.createTextNode(r.level+" RISK"));
}

function renderBspButton(){
  const btn=document.getElementById("btn-view-bsp");
  if(screen>=S.INTRO&&state.bsp_text.trim().length>0) btn.classList.remove("hidden");
  else btn.classList.add("hidden");
}

function renderProgress(){
  const wrap=document.getElementById("progress-wrap");
  const bar=document.getElementById("progress-bar");
  const show=screen>=S.INTRO&&screen<=S.DECISION;
  if(!show){wrap.classList.add("hidden");return;}
  wrap.classList.remove("hidden");
  const total=11;
  const cur=Math.min(screen,10);
  bar.style.width=(cur/total*100)+"%";
}

function renderFooter(){
  const ft=document.getElementById("footer");
  ft.innerHTML="";
  // footer renders for all screens

  if(screen>S.INPUT){
    ft.appendChild(h("button",{className:"btn-back",onclick:goBack},"← Back"));
  } else {
    ft.appendChild(h("div"));
  }

  if(screen===S.INPUT){
    // duplicate start button removed
  } else if(screen===S.INTRO){
    ft.appendChild(h("button",{className:"btn-primary sm",onclick:goNext},"Begin Review →"));
  } else if(screen>=S.BEHAVIOUR&&screen<=S.RISK){
    ft.appendChild(h("button",{className:"btn-primary sm",disabled:!canNext(),onclick:goNext},"Next →"));
  } else if(screen===S.DECISION){
    ft.appendChild(h("button",{className:"btn-primary sm",disabled:!canNext(),onclick:goNext},"See Caritas Result →"));
  } else if(screen>=S.SYSTEM&&screen<S.REFLECTION){
    ft.appendChild(h("button",{className:"btn-primary sm",onclick:()=>goTo(screen+1)},"Continue →"));
  }
}

function render(){
  renderScreen();
  renderRisk();
  renderBspButton();
  renderProgress();
  renderFooter();
}

// ─── INIT ───
render();
</script>

<script>
if (window.location.search.indexOf("embedded=true") !== -1) {
  document.addEventListener("DOMContentLoaded", function() {
    var hdr = document.querySelector(".header");
    if (hdr) hdr.style.display = "none";
    var ctr = document.querySelector(".container");
    if (ctr) ctr.style.paddingTop = "12px";
  });
}

  function mapToEvaluatorSchema(st) {
    var r = st.ratings || {};
    var ov = st.overall || {};
    var toScore = function(v) {
      if (v === null || v === undefined) return null;
      if (typeof v === 'number') return Math.min(100, Math.max(0, v));
      var m = {excellent:90,good:75,adequate:55,poor:30,critical:10,yes:85,partial:50,no:15};
      return m[String(v).toLowerCase()] !== undefined ? m[String(v).toLowerCase()] : 50;
    };
    var ds = {
      d1_rp_identification: toScore(r.s2 || r.rp_identification || r.restrictive_practices),
      d2_functional_assessment: toScore(r.s3 || r.functional_assessment || r.fba),
      d3_evidence_base: toScore(r.s4 || r.evidence_base || r.strategies),
      d4_person_centred: toScore(r.s5 || r.person_centred || r.participant_voice),
      d5_fade_out: toScore(r.s6 || r.fade_out || r.reduction),
      d6_consent_rights: toScore(r.s7 || r.consent_rights || r.consent),
      d7_implementation: toScore(r.s8 || r.implementation || r.monitoring)
    };
    var qs = null;
    if (ov.score && typeof ov.score === 'number') qs = ov.score;
    else if (ov.rating) qs = toScore(ov.rating);
    if (!qs) {
      var vals = Object.values(ds).filter(function(v){return v !== null;});
      qs = vals.length > 0 ? Math.round(vals.reduce(function(a,b){return a+b},0)/vals.length) : null;
    }
    var pr = ov.profile || ov.classification || null;
    if (!pr && qs !== null) { pr = qs >= 65 ? 'E' : qs >= 35 ? 'D' : 'A'; }
    var nf = [];
    var rf = st.flags || [];
    for (var i=0; i<rf.length; i++) {
      var f = rf[i];
      if (typeof f === 'string') nf.push({type:f,severity:'medium',detail:''});
      else if (f) nf.push({type:f.type||f.flag_type||'unknown',severity:f.severity||'medium',detail:f.detail||f.description||''});
    }
    return {quality_score:qs, primary_profile:pr, domain_scores:ds, flags:nf,
      quality_band: qs>=85?'CLEAR':qs>=65?'REVIEW':qs>=35?'CONCERN':'CRITICAL',
      decision: qs>=65?'PASS':qs>=35?'HOLD':'FAIL'};
  }


// === CALIBRATION MODE ===
(function(){
  if (window.location.search.indexOf("calibration=true") === -1) return;
  try {
    var calData = JSON.parse(sessionStorage.getItem("calibration_bsp"));
    if (!calData || !calData.text) return;
    state.bsp_text = calData.text;
    window._calibration = calData;
    var hdr = document.querySelector("h1");
    if (hdr) {
      var badge = document.createElement("span");
      badge.style.cssText = "background:#1B496B;color:#fff;font-size:11px;padding:2px 8px;border-radius:4px;margin-left:8px";
      badge.textContent = calData.bsp_id;
      hdr.appendChild(badge);
    }
    var origSubmit = window.submitFinal;
    window.submitFinal = async function() {
      state.bsp_id = window._calibration.bsp_id;
      state.reviewer = window._calibration.reviewer;
      state.calibration_session = window._calibration.session_id;
      // Test reviewers (smoke/test/alan prefix) are quarantined from analytics
      state.is_test = /^(smoke|test|alan)/i.test(state.reviewer || "");
      if (origSubmit) await origSubmit();
      sessionStorage.setItem("calibration_complete", JSON.stringify({
        bsp_id: window._calibration.bsp_id,
        decision: state.user_decision,
        completed_at: new Date().toISOString()
      }));
      setTimeout(function(){ window.location.href = "calibration.html"; }, 1500);
    };
    setTimeout(function(){
      if (typeof runBspAnalysis === "function") {
        runBspAnalysis().then(function(){ if (typeof goTo === "function") goTo(1); });
      }
    }, 500);
  } catch(e) { console.error("Calibration error:", e); }
})();
</script>
